<div class='running-header'>
  <x-periodtoolbar period-context="running"></x-periodtoolbar>
  <div class="div-datetime">
    <label class="label-current"><x-tr key="content.currentColon" default="Current:"></x-tr></label>
    <x-clock display-seconds=false></x-clock>
  </div>
</div>


<x-rotationprogress display-mode="bar"></x-rotationprogress>

<div class="tile">
  <x-datetimegraduation period-context="running"></x-datetimegraduation>
  <x-grouplist templateid='boxtoclone'></x-grouplist>
</div>

<x-rotationprogress display-mode="text"></x-rotationprogress>
