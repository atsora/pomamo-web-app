<div class="param-group group-layout">
  <div class="param-group-header group-layout">
    <div class="param-group-title"><x-tr key="options.layoutSettings" default="Layout"></x-tr></div>
    <button class="param-group-button" id="resetlayout"><x-tr key="options.resetButton" default="reset"></x-tr></button>
  </div>

  <div class="param-group-content group-layout">

    <div class="labelsubgroup">
      <div class='labelheader'>
        <label for="defaultlayout"><x-tr key="options.defaultLayout" default="Use default layout (12)"></x-tr></label>
        <input type="checkbox" id="defaultlayout" autocomplete="off" />
      </div>
    </div>

    <div class="labelsubgroup rotation-settings">
      <div class='labelheader'>
        <label><x-tr key="options.rotationSettings" default="Rotation Settings"></x-tr></label>
      </div>
      <div class="subgroup">
        <div class='inlined-radio'>
          <label for="machinesperpage"><x-tr key="options.machinesPerPage" default="Machines / page"></x-tr></label>
          <input type="number" id="machinesperpage" min="1" max="100" step="1" />
        </div>
        <div class='inlined-radio'>
          <label for="rotationdelay"><x-tr key="options.rotationDelay" default="Delay (sec)"></x-tr></label>
          <input type="number" id="rotationdelay" min="3" step="1" />
        </div>
      </div>
    </div>

  </div>
</div>

<div class="param-group group-options">
  <div class="param-group-header group-options">
    <div class="param-group-title"><x-tr key="options.title" default="Options"></x-tr></div>
    <button class="param-group-button" id="resetoptions"><x-tr key="options.resetButton"
        default="reset"></x-tr></button>
  </div>

  <div class="param-group-content group-options">

    <!-- Utilization target settings -->
    <div class="labelsubgroup">
      <div class='labelheader'>
        <label for="showtarget"><x-tr key="options.showUtilizationTarget"
            default="Show utilization target"></x-tr></label>
        <input type="checkbox" id="showtarget" autocomplete="off" />
      </div>
    </div>

    <!-- Current alarm settings -->
    <div class="labelsubgroup">
      <div class='labelheader'>
        <label for="showalarm"><x-tr key="options.showCurrentAlarm"
            default="Show current alarm"></x-tr></label>
        <input type="checkbox" id="showalarm" autocomplete="off" />
      </div>
    </div>

    <!-- Stacklight settings -->
    <div class="labelsubgroup">
      <div class='labelheader'>
        <label for="showstacklight"><x-tr key="options.showStackLights"
            default="Show stack lights"></x-tr></label>
        <input type="checkbox" id="showstacklight" autocomplete="off" />
      </div>
    </div>

  </div>
</div>
