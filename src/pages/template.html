<!DOCTYPE HTML>
<html>

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta charset="UTF-8">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <!-- Safari - full screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <!-- Chrome - https://developers.google.com/chrome/mobile/docs/installtohomescreen -->
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">

  <!-- Load Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <!-- the title will be overridden - CUSTOM allowed -->
  <title></title>

  <style>
    svg {
      visibility: hidden;
    }
  </style>

  <!-- Theme bootstrap + page CSS loading. Blocking script in <head> (runs before paint,
       no theme flash). All logic is in scripts/theme-init.js: it toggles the `dark` class
       on <html>, derives the page name from the URL, and loads theme-colors.css (CSS vars
       for both themes) + the page CSS + customize.css. The ?v= is rewritten by grunt and
       propagated to the CSS by the script itself. No more {{pagename}} placeholder here. -->
  <script type="text/javascript" src="./scripts/theme-init.js?v="></script>

  <!-- Shared page chrome (header, nav, options, legend) as the <pulse-shell> web
       component. Loaded before <body> so the element is defined when it is parsed. -->
  <script type="text/javascript" src="./scripts/pulse-shell.js?v="></script>

  <!--script src="https://unpkg.com/@webcomponents/custom-elements"></script-->
  <script type="text/javascript" src="./lib/moment/moment.js?v="></script>
  <script type="text/javascript" src="./lib/d3/d3.min.js?v="></script>

  <script type="text/javascript" src="./scripts/browsersupport.js?v="></script>

  <!--script type="text/javascript" src="./scripts/polyfills.js?v="></script-->

  <script type="text/javascript" src="./scripts/config_component_default.js"></script>
  <script type="text/javascript" src="./scripts/config_default.js?v="></script>
  <script type="text/javascript" src="./scripts/config_install.js?v="></script>
  <script type="text/javascript" src="./scripts/config_custom.js?v="></script>

  <script type="text/javascript" src="./scripts/translation_component_default.js?v="></script>
  <script type="text/javascript" src="./scripts/translation_default.js?v="></script>
  <script type="text/javascript" src="./scripts/translation_locale.js?v="></script>
  <script type="text/javascript" src="./scripts/translation_custom.js?v="></script>

  <!-- for reporting : script type="text/javascript" src="./scripts/pulse.exports.light.js?v="></script-->

  <!-- CUSTOM allowed : un-comment one of the 2 next lines and remove the 3rd -->
  <!--script async type="text/javascript" src="./scripts/custom_page.js?v="></script-->
  <!--script async type="text/javascript" src="./scripts/custom_page_with_machines.js?v="></script-->
  <script async type="text/javascript" src="./es2015/{{pagename}}.js?v="></script>

  <!-- load the webcomponents loader, which injects the necessary polyfill bundle -->
  <!--script src="node_modules/@webcomponents/webcomponentsjs/webcomponents-loader.js"></script-->
  <!--script src="https://unpkg.com/@webcomponents/custom-elements"></script-->
</head>

<body>
  <div class="pulse-content">
    <!-- The shared chrome (header, nav, options panel, legend) is rendered by the
         <pulse-shell> web component (scripts/pulse-shell.js). Each page supplies only
         its own regions below; grunt 'bake' fills them per page, exactly as before. -->
    <pulse-shell page="{{pagename}}">
      <!-- CUSTOM allowed -->
      <template data-region="hidden"><!--(bake {{pagename}}/hidden_content.html)--></template>
      <template data-region="content"><!--(bake {{pagename}}/content.html)--></template>
      <template data-region="legend"><!--(bake {{pagename}}/legend.html)--></template>
      <template data-region="options"><!--(bake {{pagename}}/options.html)--></template>
    </pulse-shell>
  </div>

  <!-- Vue app bundle (built from atsora-vue via pnpm build). Fixed file names (index.js / index.css);
       cache-busting is the `?v=` query, rewritten to the build version by grunt replace:html.
       Auto-loaded on vue-* pages (full app). On other Pulse pages it is NOT loaded eagerly (PrimeVue
       would inject global <style> that could leak into Pulse) — instead window.__loadVue is exposed so
       a Pulse page can mount the Vue app lazily on demand (e.g. to open the task execution popup over
       the page, on first task click). The CSS link is scoped to #vue-app, so loading it everywhere is harmless. -->
  <link rel="stylesheet" href="./vue-dist/static/index.css?v=">
  <script type="module">
    window.__loadVue = function () {
      window.__vueLoading = window.__vueLoading || import('./vue-dist/static/index.js?v=');
      return window.__vueLoading;
    };
    if (/(^|\/)vue-[^/]*\.html$/.test(location.pathname))
      window.__loadVue();
  </script>
</body>

</html>
