<div class="tile" id='boxtoclone'>
    <div class="tile-title">
      <div class="machinedisplay-position">
        <x-machinedisplay></x-machinedisplay>
      </div>
    </div>
    <div class="tile-content">
      <!-- TODAY -->
      <div class="machinespecification-line">
        <div class="machinespecification-period-div">
          <span class="machinespecification-period-span"><x-tr key="content.today" default="Today"></x-tr></span>
        </div>
        <div class="machinespecification-bar">
          <x-barstack period-context="machinespecification" motion-context="motionContextToday"></x-barstack>
          <x-datetimegraduation bottom=true period-context="machinespecification"></x-datetimegraduation>
        </div>
        <div class="machinespecification-motion">
          <x-motionpercentage motion-context='motionContextToday'></x-motionpercentage>
          <x-motiontime motion-context='motionContextToday'></x-motiontime>
        </div>
      </div>
      <!-- YESTERDAY -->
      <div class="machinespecification-line">
        <div class="machinespecification-period-div">
          <span class="machinespecification-period-span"><x-tr key="content.yesterday" default="Yesterday"></x-tr></span>
        </div>
        <div class="machinespecification-bar">
          <x-barstack period-context="periodContextYesterday" motion-context="motionContextYesterday" main-bar="running"></x-barstack>
          <x-datetimegraduation bottom=true period-context="periodContextYesterday"></x-datetimegraduation>
        </div>
        <div class="machinespecification-motion">
          <x-motionpercentage motion-context='motionContextYesterday'></x-motionpercentage>
          <x-motiontime motion-context='motionContextYesterday'></x-motiontime>
        </div>
      </div>
      <!-- Last 7 days -->
      <div class="machinespecification-line">
        <div class="machinespecification-period-div">
          <span class="machinespecification-period-span"><x-tr key="content.last7days" default="Last 7 days"></x-tr></span>
        </div>
        <div class="machinespecification-bar">
          <x-barstack period-context="periodContextLast7Days" motion-context="motionContextLast7Days" main-bar="running"></x-barstack>
          <x-datetimegraduation bottom=true period-context="periodContextLast7Days"></x-datetimegraduation>
        </div>
        <div class="machinespecification-motion">
          <x-motionpercentage motion-context='motionContextLast7Days'></x-motionpercentage>
          <x-motiontime motion-context='motionContextLast7Days'></x-motiontime>
        </div>

      </div>

    </div>
</div>
